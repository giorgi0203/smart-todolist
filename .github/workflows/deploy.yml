name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Setup pnpm (must be before setup-node for caching)
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # Setup Node.js and install dependencies
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile --ignore-scripts

      # Lint and build the Next.js app
      - run: pnpm lint
      - run: pnpm build

      - name: Package Next.js standalone artifacts
        run: |
          tar -C .next/standalone -czf nextjs-standalone.tar.gz .
          tar -C .next -czf nextjs-static.tar.gz static
          tar -C . -czf nextjs-public.tar.gz public

      # Setup .NET and publish the agent
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish .NET agent
        run: dotnet publish agent/ProverbsAgent.csproj -c Release -o agent-publish

      # Upload packaged Next.js standalone server
      - uses: actions/upload-artifact@v4
        with:
          name: nextjs-standalone
          path: nextjs-standalone.tar.gz
          retention-days: 1

      # Upload packaged Next.js static assets
      - uses: actions/upload-artifact@v4
        with:
          name: nextjs-static
          path: nextjs-static.tar.gz
          retention-days: 1

      # Upload packaged Next.js public assets
      - uses: actions/upload-artifact@v4
        with:
          name: nextjs-public
          path: nextjs-public.tar.gz
          retention-days: 1

      # Upload .NET agent artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: agent-build
          path: agent-publish/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      # Download all artifacts
      - uses: actions/download-artifact@v4
        with:
          name: nextjs-standalone
          path: deploy/nextjs/

      - uses: actions/download-artifact@v4
        with:
          name: nextjs-static
          path: deploy/nextjs-static/

      - uses: actions/download-artifact@v4
        with:
          name: nextjs-public
          path: deploy/nextjs-public/

      - uses: actions/download-artifact@v4
        with:
          name: agent-build
          path: deploy/agent/

      # Test connectivity before deployment
      - name: Test Droplet Connectivity
        run: |
          echo "Testing connectivity to droplet..."
          ping -c 3 ${{ secrets.DROPLET_HOST }} || echo "Ping failed but continuing..."
          timeout 10s bash -c "</dev/tcp/${{ secrets.DROPLET_HOST }}/22" && echo "Port 22 is open" || echo "Port 22 connection failed"
        continue-on-error: true

      # Prepare deployment on server
      - name: Prepare deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          debug: true
          script: |
            echo "=== Deployment Started ==="
            echo "Connected to: $(hostname)"

            # Stop running services
            echo "Stopping services..."
            sudo systemctl stop smart-todolist-web || true
            sudo systemctl stop smart-todolist-agent || true

            # Backup current deployment
            echo "Backing up current deployment..."
            sudo rm -rf /var/www/smart-todolist/backup
            if [ -d "/var/www/smart-todolist/current" ]; then
              sudo cp -r /var/www/smart-todolist/current /var/www/smart-todolist/backup
              echo "Backup created"
            fi

            # Create deployment directories
            sudo mkdir -p /var/www/smart-todolist/current/nextjs
            sudo mkdir -p /var/www/smart-todolist/current/agent
            sudo chown -R $USER:www-data /var/www/smart-todolist/current
            echo "Deployment directory prepared"

      # Copy Next.js packaged standalone build
      - name: Copy Next.js standalone package
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          timeout: 60s
          debug: true
          source: "deploy/nextjs/nextjs-standalone.tar.gz"
          target: "/tmp/"
          strip_components: 2

      # Copy Next.js packaged static assets
      - name: Copy Next.js static package
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          timeout: 60s
          debug: true
          source: "deploy/nextjs-static/nextjs-static.tar.gz"
          target: "/tmp/"
          strip_components: 2

      # Copy Next.js packaged public assets
      - name: Copy Next.js public package
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          timeout: 60s
          debug: true
          source: "deploy/nextjs-public/nextjs-public.tar.gz"
          target: "/tmp/"
          strip_components: 2

      # Copy .NET agent build
      - name: Copy agent build
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          timeout: 60s
          debug: true
          source: "deploy/agent/*"
          target: "/var/www/smart-todolist/current/agent/"
          strip_components: 2

      # Finalize deployment
      - name: Finalize deployment
        uses: appleboy/ssh-action@v1.0.0
        env:
          GITHUB_TOKEN_SECRET: ${{ secrets.AGENT_GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 5m
          debug: true
          envs: GITHUB_TOKEN_SECRET
          script: |
            echo "=== Finalizing Deployment ==="

            # Validate uploaded web artifacts before extraction.
            test -f /tmp/nextjs-standalone.tar.gz
            test -f /tmp/nextjs-static.tar.gz
            test -f /tmp/nextjs-public.tar.gz

            # Extract Next.js standalone artifacts on server.
            sudo rm -rf /var/www/smart-todolist/current/nextjs
            sudo mkdir -p /var/www/smart-todolist/current/nextjs
            sudo tar -xzf /tmp/nextjs-standalone.tar.gz -C /var/www/smart-todolist/current/nextjs
            sudo mkdir -p /var/www/smart-todolist/current/nextjs/.next
            sudo tar -xzf /tmp/nextjs-static.tar.gz -C /var/www/smart-todolist/current/nextjs/.next
            sudo tar -xzf /tmp/nextjs-public.tar.gz -C /var/www/smart-todolist/current/nextjs
            sudo rm -f /tmp/nextjs-standalone.tar.gz /tmp/nextjs-static.tar.gz /tmp/nextjs-public.tar.gz

            # Some standalone archives can contain an extra top-level folder.
            if [ ! -f /var/www/smart-todolist/current/nextjs/server.js ]; then
              NESTED_SERVER=$(find /var/www/smart-todolist/current/nextjs -mindepth 2 -maxdepth 4 -type f -name server.js | head -n 1 || true)
              if [ -n "${NESTED_SERVER}" ]; then
                NESTED_DIR=$(dirname "${NESTED_SERVER}")
                sudo cp -a "${NESTED_DIR}"/. /var/www/smart-todolist/current/nextjs/
              fi
            fi

            if [ ! -f /var/www/smart-todolist/current/nextjs/server.js ]; then
              echo "ERROR: server.js missing after extraction"
              find /var/www/smart-todolist/current/nextjs -maxdepth 4 -type f | sed -n '1,120p'
              exit 1
            fi

            if [ -z "${GITHUB_TOKEN_SECRET}" ]; then
              echo "ERROR: AGENT_GITHUB_TOKEN is empty. Set repository secret AGENT_GITHUB_TOKEN before deploy."
              exit 1
            fi

            # Write the agent environment file with the GitHub token
            echo "Writing agent environment config..."
            sudo tee /var/www/smart-todolist/current/agent/appsettings.Production.json > /dev/null <<EOF
            {
              "GitHubToken": "${GITHUB_TOKEN_SECRET}",
              "Logging": {
                "LogLevel": {
                  "Default": "Warning",
                  "Microsoft.AspNetCore": "Warning"
                }
              },
              "AllowedHosts": "*"
            }
            EOF

            # Set permissions
            echo "Setting permissions..."
            sudo chown -R www-data:www-data /var/www/smart-todolist/current
            sudo chmod -R 755 /var/www/smart-todolist/current
            sudo chmod +x /var/www/smart-todolist/current/agent/ProverbsAgent || true

            # Verify files
            echo "Next.js files:"
            ls -la /var/www/smart-todolist/current/nextjs/
            echo "Next.js sample tree:"
            find /var/www/smart-todolist/current/nextjs -maxdepth 3 -type f | sed -n '1,80p'
            echo "Agent files:"
            ls -la /var/www/smart-todolist/current/agent/
            echo "Installed dotnet runtimes:"
            dotnet --list-runtimes || true

            # Copy systemd service files (deployed via scp in earlier step)
            # Service files are installed by setup-server.sh on first deploy
            sudo systemctl daemon-reload

            # Kill any stale listeners that can block service startup.
            for PORT in 3000 8000; do
              PIDS=$(sudo ss -ltnp "sport = :${PORT}" 2>/dev/null | awk -F'pid=' 'NR>1 {split($2,a,","); print a[1]}' | sort -u)
              if [ -n "${PIDS}" ]; then
                echo "Killing stale listeners on :${PORT}: ${PIDS}"
                for PID in ${PIDS}; do
                  sudo kill -9 "${PID}" || true
                done
              fi
            done

            # Start services
            echo "Starting services..."
            sudo systemctl start smart-todolist-agent
            sudo systemctl start smart-todolist-web

            # Wait and verify
            sleep 3
            echo "Agent status:"
            sudo systemctl status smart-todolist-agent --no-pager || true
            sudo journalctl -u smart-todolist-agent -n 80 --no-pager -l || true
            echo "Web status:"
            sudo systemctl status smart-todolist-web --no-pager || true
            sudo journalctl -u smart-todolist-web -n 80 --no-pager -l || true

            # Test nginx config and reload
            echo "Testing nginx configuration..."
            sudo nginx -t
            sudo systemctl reload nginx

            # Test local response
            echo "Testing local response..."
            curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "Web test pending startup..."
            curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 || echo "Agent test pending startup..."

            echo "=== Deployment Complete ==="
